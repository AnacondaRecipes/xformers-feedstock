{% set name = "xformers" %}
{% set version = "0.0.29.post1" %}
{% set build = "0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  - url: https://pypi.io/packages/source/x/xformers/xformers-{{ version }}.tar.gz
    sha256: d78c256e4c24ecc00f6f374d5b96afd0b56b3fb197f02d9efff4357fd5a399b4
  - url: https://raw.githubusercontent.com/NVIDIA/cutlass/main/LICENSE.txt
    sha256: 42fec630f410aa308f70a51a89fadcd19586fa620f9831a32bee528a9a10000e
    file_name: third_party/cutlass/LICENSE.txt
    folder: third_party/cutlass
  - url: https://raw.githubusercontent.com/Dao-AILab/flash-attention/main/LICENSE
    sha256: 8c9ccb96c065e706135b6cbad279b721da6156e51f3a5f27c6b3329af9416d73
    folder: third_party/flash-attention

build:
  number: {{ build }}
  string: {{ cpu_or_cuda }}_py{{ py }}h{{ PKG_HASH }}_{{ build }}                    # [ cpu_or_cuda == "cpu" ]
  string: {{ cpu_or_cuda }}_{{ cuda_version }}_py{{ py }}h{{ PKG_HASH }}_{{ build }} # [ cpu_or_cuda == "cuda" ]
  string: MISSING_ABS_py{{ py }}h{{ PKG_HASH }}_{{ build }} # [ (not cpu_or_cuda == "cuda") and (not cpu_or_cuda == "cpu") ]

  # cuda requirements aren't available on osx or windows
  skip: True # [win or (osx-arm64 and cpu_or_cuda == "cuda")]
  script_env:
    - cuda_compiler_version="None"                # [ cpu_or_cuda == "cpu"]
    - cuda_compiler_version={{ cuda_version }}    # [ cpu_or_cuda == "cuda"]
    - package_version={{ version }}

requirements:
  build:
    - python
    - git
    - {{ "pytorch * cpu*" }}  # [ cpu_or_cuda == "cpu" ]
    - {{ "pytorch * *cuda" }}{{ cuda_compiler_version }}*  # [ cpu_or_cuda == "cuda" ]
    - pytorch >=2.4

    - cuda-driver-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-cudart-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-nvrtc-dev   # [ cpu_or_cuda == "cuda" ]
    - cuda-nvtx-dev    # [ cpu_or_cuda == "cuda" ]
    - cuda-nvml-dev    # [ cpu_or_cuda == "cuda" ]
    - libcublas-dev    # [ cpu_or_cuda == "cuda" ]
    - libcufft-dev     # [ cpu_or_cuda == "cuda" ]
    - libcurand-dev    # [ cpu_or_cuda == "cuda" ]
    - libcusolver-dev  # [ cpu_or_cuda == "cuda" ]
    - libcusparse-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-version =={{ cuda_version }} # [ cpu_or_cuda == "cuda" ]

    - {{ compiler('cxx') }}
    - {{ compiler('cuda') }}            # [ cpu_or_cuda == "cuda" ] 

  host:
    - wheel
    - python
    - pip
    - setuptools
    - {{ "pytorch * cpu*" }}  # [ cpu_or_cuda == "cpu" ]
    - {{ "pytorch * gpu*" }} # [ cpu_or_cuda == "cuda" ]
    - pytorch >=2.4


    - cuda-driver-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-cudart-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-nvrtc-dev   # [ cpu_or_cuda == "cuda" ]
    - cuda-nvtx-dev    # [ cpu_or_cuda == "cuda" ]
    - cuda-nvml-dev    # [ cpu_or_cuda == "cuda" ]
    - libcublas-dev    # [ cpu_or_cuda == "cuda" ]
    - libcufft-dev     # [ cpu_or_cuda == "cuda" ]
    - libcurand-dev    # [ cpu_or_cuda == "cuda" ]
    - libcusolver-dev  # [ cpu_or_cuda == "cuda" ]
    - libcusparse-dev  # [ cpu_or_cuda == "cuda" ]
    - cuda-version =={{ cuda_version }} # [ cpu_or_cuda == "cuda" ]

  run:
    - python
    - numpy
    - pyre-extensions >=0.0.29
    - {{ "pytorch * cpu*" }}  # [ cpu_or_cuda == "cpu" ]
    - {{ "pytorch * gpu*" }} # [ cpu_or_cuda == "cuda" ]

  ignore_run_exports:  # [ cpu_or_cuda == "cuda" ]
    # not identical to list of host deps; we do need cuda-cudart,
    # cuda-driver-dev & cuda-nvml-dev have no run-exports

    - cuda-nvrtc-dev   # [ cpu_or_cuda == "cuda" ]
    - cuda-nvtx-dev    # [ cpu_or_cuda == "cuda" ]
    - libcublas-dev    # [ cpu_or_cuda == "cuda" ]
    - libcufft-dev     # [ cpu_or_cuda == "cuda" ]
    - libcurand-dev    # [ cpu_or_cuda == "cuda" ]
    - libcusolver-dev  # [ cpu_or_cuda == "cuda" ]
    - libcusparse-dev  # [ cpu_or_cuda == "cuda" ]


test:
  requires:
    - pip
  imports:
    - xformers
  commands:
    - pip check
#$  - script:
#      - python -m xformers.info

about:
  license: BSD-3-Clause AND Apache-2.0
  license_family: BSD
  license_file:
    - LICENSE
    - third_party/cutlass/LICENSE.txt
    - third_party/flash-attention/LICENSE
    - third_party/sputnik/LICENSE
  summary: "XFormers: A collection of composable Transformer building blocks."
  home: https://facebookresearch.github.io/xformers/
  description: "xFormers is a PyTorch based library which hosts flexible Transformers parts"
  dev_url: https://github.com/facebookresearch/xformers
  doc_url: https://facebookresearch.github.io/xformers/

extra:
  skip-lints:
    - host_section_needs_exact_pinnings
  anaconda-services:
    ref: https://anaconda.zendesk.com/agent/tickets/49522
    reason: Dependency for vllm
    recipe-maintainers:
      - bkreider
  recipe-maintainers:
    - jan-janssen
    - h-vetinari
